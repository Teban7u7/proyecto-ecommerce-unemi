version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: licoreria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d licoreria_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false   # No falla si no existe el .env
    environment:
      # Estos valores sobreescriben el .env — son los correctos para Docker
      - DATABASE_URL=postgresql://user:password@db:5432/licoreria_db
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,django
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://frontend:5173
      - PAYMENT_SERVICE_URL=http://node:3001
      - PAYMENT_SERVICE_SECRET=internal-shared-secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  node:
    build:
      context: ./payment-service
    command: npm run dev
    volumes:
      - ./payment-service/src:/app/src
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DJANGO_API_URL=http://django:8000/api
      - PAYMENT_SERVICE_SECRET=internal-shared-secret
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - django
    restart: unless-stopped

volumes:
  postgres_data:
